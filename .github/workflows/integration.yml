name: Integration Tests

on:
  push:
    branches: [main]
  # Also: run manually or on schedule
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2am

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Only run if secrets are configured
    if: ${{ secrets.INTEGRATION_TESTS_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Run integration tests
        env:
          # Add project-specific env vars here
          # PROJECT_TEST_MONGO_URI: ${{ secrets.PROJECT_TEST_MONGO_URI }}
          # PROJECT_TEST_POSTGRES_URL: ${{ secrets.PROJECT_TEST_POSTGRES_URL }}
        run: |
          go test -tags integration ./test/integration/... -count=1 -v -timeout 10m
